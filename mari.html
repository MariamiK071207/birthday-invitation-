<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mariami's 14th Birthday</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#ffd1e8,#ffe8f4);
}

.card{
    background:white;
    width:360px;
    padding:35px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

h1{
    color:#ff4f8b;
    margin-bottom:15px;
    font-size:30px;
}

p{
    color:#555;
    margin-bottom:15px;
    line-height:1.5;
    font-size:17px;
}

input{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:1px solid #ddd;
    font-size:16px;
    outline:none;
    margin-top:10px;
}

input:focus{
    border-color:#ff4f8b;
}

button{
    width:100%;
    margin-top:20px;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#ff4f8b;
    color:white;
    font-size:17px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#ff2d73;
}

.footer{
    margin-top:18px;
    color:#999;
    font-size:14px;
}
</style>

</head>
<body>

<div class="card">

<h1>🎉 You're Invited! 🎉</h1>

<p>
You are invited to <strong>Mariami's 14th Birthday!</strong> 💖
</p>

<p>
Please enter your name below to confirm your attendance.
</p>

<form action="https://formspree.io/f/mzdqqzkb" method="POST">

<input
type="text"
name="Guest Name"
placeholder="Your Name"
required>

<button type="submit">
Confirm Attendance
</button>

</form>

<div class="footer">
We can't wait to celebrate with you! ✨
</div>

</div>

</body>
</html>
